<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';" />
        <title>Vordle</title>
        <meta name="description" content="Tiếng Việt không khó?" />
        <link rel="icon" href="logo.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <img src="logo.svg" alt="Vordle logo" class="site-logo" />
            <h1>VORDLE</h1>
            <p class="subtitle">Tiếng Việt eazy?</p>
            <div class="day-nav">
                <button id="prev-day" type="button" aria-label="Ngày trước">&#8249;</button>
                <span id="current-date"></span>
                <button id="next-day" type="button" aria-label="Ngày sau">&#8250;</button>
            </div>
            <div class="quiz-nav" id="quiz-nav">
                <button class="quiz-btn" data-quiz="1" type="button">1</button>
                <button class="quiz-btn" data-quiz="2" type="button">2</button>
                <button class="quiz-btn" data-quiz="3" type="button">3</button>
                <button class="quiz-btn" data-quiz="4" type="button">4</button>
                <button class="quiz-btn" data-quiz="5" type="button">5</button>
            </div>
        </header>

        <main>
            <section class="hint" id="hint">
                <div class="hint-row">
                    <span class="hint-label">Phụ âm</span>
                    <span class="hint-items" id="hint-consonants"></span>
                </div>
                <div class="hint-row">
                    <span class="hint-label">Nguyên âm</span>
                    <span class="hint-items" id="hint-vowels"></span>
                </div>
                <div class="hint-row">
                    <span class="hint-label">Thanh</span>
                    <span class="hint-items" id="hint-tones"></span>
                </div>
            </section>

            <p class="keyword-info" id="keyword-info"></p>

            <div class="game-area">
                <div class="row-wrapper">
                    <div class="input-row" id="input-row"></div>
                </div>

                <button id="submit-btn" type="button">Gửi</button>

                <div class="results" id="results"></div>
            </div>

            <div class="win-panel hidden" id="win-panel">
                <p class="win-msg">Chúc mừng!</p>
                <p class="win-answer" id="win-answer"></p>
                <pre id="share-grid"></pre>
                <button id="copy-btn" type="button">Sao chép kết quả</button>
                <a id="share-url" class="share-url" href="#"></a>
            </div>
            <button id="clear-btn" type="button" aria-label="Xóa kết quả đã lưu" title="Xóa kết quả đã lưu">
                Xóa kết quả đã lưu
            </button>
        </main>

        <script src="words.js"></script>
        <script src="schedule.js"></script>
        <script src="game.js"></script>
    </body>
</html>
